name: Aether CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Full CI suite — Linux (GCC), Linux (Clang), macOS (Clang)
  # Runs `make ci` which is the single source of truth:
  #   compiler (-Werror), ae, stdlib, unit tests,
  #   .ae integration tests (includes REPL tests), examples.
  # ============================================================
  ci:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC
            os: ubuntu-22.04
            cc: gcc
            harden: "0"
            install: sudo apt-get update && sudo apt-get install -y gcc make bc pkg-config libgtk-4-dev

          - name: Linux / Clang
            os: ubuntu-22.04
            cc: clang
            harden: "0"
            install: sudo apt-get update && sudo apt-get install -y clang make bc pkg-config libgtk-4-dev

          # Hardened gcc build (issue #396). Same OS + compiler as
          # Linux / GCC but with HARDEN=1 set in the environment, which
          # adds -fstack-protector-all + -D_FORTIFY_SOURCE=2 +
          # -Wformat-security to CFLAGS in the Makefile. A regression
          # that introduces an unchecked memcpy / strncpy / printf-
          # format-injection trips the gcc compile-time diagnostic here
          # before merge — defence-in-depth without imposing the
          # runtime overhead on the default release builds.
          - name: Linux / Hardened (gcc)
            os: ubuntu-22.04
            cc: gcc
            harden: "1"
            install: sudo apt-get update && sudo apt-get install -y gcc make bc pkg-config libgtk-4-dev

          - name: macOS / Clang (ARM64)
            os: macos-latest
            cc: clang
            harden: "0"
            install: ""

          - name: macOS / Clang (x86_64)
            os: macos-15-intel
            cc: clang
            harden: "0"
            install: ""

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      if: matrix.install != ''
      run: ${{ matrix.install }}

    - name: Run full CI suite
      run: HARDEN=${{ matrix.harden }} CC=${{ matrix.cc }} make ci

    # macOS leaks(1) gate (#468). Runs only on the ARM64 macOS job —
    # one macOS arch is enough leak coverage, and MallocStackLogging
    # is ~10x slower so we don't want it on both. Linux gets leak
    # coverage from test-valgrind + ASan-LSan; this is the only
    # detector that works on Apple Silicon (Apple clang ships ASan
    # without LSan; upstream LSan hangs here).
    - name: macOS leaks gate
      if: matrix.name == 'macOS / Clang (ARM64)'
      # Hard step cap as a backstop to the per-test timeouts inside
      # run_macos_leaks.sh: the gate can never hold a runner indefinitely.
      # 20 min is generous for 16 instrumented programs (leaks +
      # MallocStackLogging is ~10x slower than the bare run).
      timeout-minutes: 20
      run: make test-macos-leaks

  # ============================================================
  # contrib/host bridge check — syntax check of every host bridge
  # in stub mode (always-on), plus end-to-end build+link+run of
  # host demos for every language whose dev library is installed
  # on the runner. Linux-only since apt installs most dev libs
  # in one shot; other platforms can be added if needed.
  # ============================================================
  ci-contrib-host:
    name: contrib/host bridges (Linux)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install host language dev libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc make bc pkg-config \
          liblua5.3-dev \
          python3-dev \
          ruby-dev \
          libperl-dev \
          duktape-dev \
          tcl-dev \
          golang-go

    - name: Build compiler + stdlib
      run: make compiler ae stdlib

    - name: Run contrib/host check
      run: make contrib-host-check

  # ============================================================
  # Windows CI — MinGW via MSYS2
  # Runs `make ci` — compiler, ae, stdlib, unit tests,
  # .ae integration tests (includes REPL tests), examples.
  # ============================================================
  ci-windows:
    name: Windows / GCC (MSYS2)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4

    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        # zlib + openssl are needed by std.zlib and std.cryptography
        # (+ std.net TLS). Without them AETHER_HAS_ZLIB /
        # AETHER_HAS_OPENSSL go undefined and the stdlib wrappers
        # fall into their "unavailable" stub paths — which is a real
        # cliff for users of the Windows binary release, not just a
        # test-matrix skip.
        # ca-certificates ships /mingw64/etc/ssl/certs/ca-bundle.crt — required
        # for HTTPS in std.net (without it the OpenSSL handshake completes but
        # cert verification fails for lack of a trust anchor on Windows).
        install: mingw-w64-x86_64-gcc mingw-w64-x86_64-zlib mingw-w64-x86_64-openssl mingw-w64-x86_64-ca-certificates pkg-config make bc

    # Windows Defender real-time scanning of every compiler-produced
    # file is the dominant Windows-CI tax: `make ci` builds ~585 separate
    # test executables, and AV-scanning each .c/.o/.exe as it is written
    # made the .ae test phase ~33 min (vs ~5 min for the same suite on
    # Linux/macOS, which have no such scanner). Excluding the runner work
    # tree + temp dirs (and the toolchain processes) from real-time
    # scanning removes that per-file tax. Best-effort: the job must never
    # fail because Defender wasn't adjustable on a given runner image.
    - name: Speed up build — exclude work tree from Windows Defender
      shell: pwsh
      continue-on-error: true
      run: |
        Add-MpPreference -ExclusionPath "D:\a" -ErrorAction SilentlyContinue
        Add-MpPreference -ExclusionPath "$env:RUNNER_TEMP" -ErrorAction SilentlyContinue
        Add-MpPreference -ExclusionPath "$env:TEMP" -ErrorAction SilentlyContinue
        Add-MpPreference -ExclusionPath "$env:TMP" -ErrorAction SilentlyContinue
        foreach ($p in 'gcc.exe','cc1.exe','collect2.exe','ld.exe','as.exe','aetherc.exe','ae.exe','bash.exe','sh.exe','make.exe') {
          Add-MpPreference -ExclusionProcess $p -ErrorAction SilentlyContinue
        }
        Write-Host "Windows Defender exclusions applied (best-effort)."

    - name: Run CI suite
      # 30-min backstop. With the per-test build fanned out across NPROC
      # jobs and Defender exclusions in place the suite finishes well under
      # this; the cap guarantees a hung step can never hold the runner to
      # GitHub's 6-hour ceiling (mirrors the macOS leaks-gate cap).
      timeout-minutes: 30
      env:
        # Oversubscribe the 4-vCPU runner. Each .ae test build spends a lot
        # of its wall time in process spawn / link / I/O rather than pure
        # CPU, so running more jobs than cores keeps all CPUs busy instead
        # of idling on those waits. NPROC drives both the `-j` toolchain
        # build and the `-P` .ae-test fan-out (Makefile defaults to nproc).
        NPROC: "8"
      # The hardcoded `C:\msys64\...` probe in aether_http.c::load_windows_ca_bundle
      # doesn't match the GitHub runner's MSYS2 path (it's installed under a
      # temp dir, not C:\msys64). Export SSL_CERT_FILE explicitly using
      # cygpath -w so the first probe in get_ssl_ctx() hits regardless of
      # where MSYS2 lives on this runner. Without this, `tests/regression/
      # test_https_client.ae` fails with "certificate verify failed".
      run: |
        export SSL_CERT_FILE="$(cygpath -w /mingw64/etc/ssl/certs/ca-bundle.crt)"
        echo "SSL_CERT_FILE=$SSL_CERT_FILE"
        ls -la "$(cygpath -u "$SSL_CERT_FILE")"
        make ci

  # ============================================================
  # Platform portability — cooperative scheduler, WASM, embedded
  # Verifies Aether compiles and runs on threadless platforms.
  # ============================================================
  ci-coop:
    name: Cooperative Scheduler (no pthreads)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      run: sudo apt-get update && sudo apt-get install -y gcc make bc

    - name: Run cooperative scheduler CI
      run: make ci-coop

  ci-wasm:
    name: WebAssembly (Emscripten)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.51

    - name: Install native GCC
      run: sudo apt-get update && sudo apt-get install -y gcc make bc

    - name: Run WASM CI
      run: make ci-wasm

  ci-embedded:
    name: Embedded ARM (Cortex-M4)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install ARM cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make gcc-arm-none-eabi libnewlib-arm-none-eabi

    - name: Run embedded CI
      run: make ci-embedded

  # ============================================================
  # RISC-V 64-bit cross-compile + qemu-user-static (issue #397).
  # Catches portability bugs that an x86_64-only matrix can't see —
  # pointer-width / struct-padding / atomic-instruction differences
  # between x86_64 and riscv64. The cross-compiler is a host x86_64
  # binary; qemu-riscv64-static actually runs the cross-built
  # aetherc / ae for a smoke check.
  # ============================================================
  ci-riscv64:
    name: Linux / RISC-V 64 (cross via qemu)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install RISC-V cross-toolchain + qemu
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-riscv64-linux-gnu \
          libc6-dev-riscv64-cross \
          qemu-user-static \
          make bc pkg-config file

    - name: Run RISC-V CI
      run: make ci-riscv64

  # ============================================================
  # Memory safety — Valgrind + AddressSanitizer on Linux/GCC
  # Separate from main CI because it needs special build flags
  # and is slower. Runs in parallel with the ci job.
  # ============================================================
  memory-checks:
    name: Memory Safety (Valgrind + ASan)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y valgrind gcc-multilib

    - name: Valgrind — runtime test suite
      run: |
        CFLAGS="-g -O0" make compiler
        CFLAGS="-g -O0" make test-build
        valgrind --leak-check=full \
                 --show-leak-kinds=all \
                 --track-origins=yes \
                 --error-exitcode=0 \
                 --log-file=valgrind.log \
                 ./build/test_runner 2>&1 || true
        if grep -q "definitely lost: 0 bytes" valgrind.log && \
           grep -q "indirectly lost: 0 bytes" valgrind.log; then
          echo "No memory leaks detected"
        else
          echo "WARNING: Memory leaks detected (non-fatal)"
          head -100 valgrind.log
        fi
      continue-on-error: true

    - name: AddressSanitizer — runtime test suite
      run: |
        make clean
        make compiler CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
                      LDFLAGS="-fsanitize=address -pthread -lm"
        make test-build CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
                        LDFLAGS="-fsanitize=address -pthread -lm"
        ASAN_OPTIONS=detect_leaks=1:check_initialization_order=1 \
          ./build/test_runner 2>&1 | tee asan.log
        if grep -q "ERROR: AddressSanitizer" asan.log; then
          echo "ERROR: AddressSanitizer detected errors!"
          cat asan.log
          exit 1
        fi

    - name: Upload memory reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: memory-reports
        path: |
          valgrind.log
          asan.log
        retention-days: 7
